name: AdScout weekly crawl

on:
  schedule:
    - cron: "0 8 * * 1"   # Mondays 08:00 UTC
  workflow_dispatch:        # manual trigger for live demos

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 pyyaml

      - name: Crawl all sources
        run: python crawl.py

      - name: Commit new corpus files
        run: |
          git config user.name "adscout-bot"
          git config user.email "adscout-bot@users.noreply.github.com"
          git add corpus/
          if git diff --cached --quiet; then
            echo "No new articles this week."
          else
            git commit -m "crawl: weekly corpus update $(date -u +%F)"
            git push
          fi

      # TODO: post digest to chat webhook (subscription layer, next sprint)
